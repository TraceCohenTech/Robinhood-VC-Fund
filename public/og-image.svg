  <!-- Title -->
  <text x="80" y="250" font-family="-apple-system, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">Robinhood's</text>
  <text x="80" y="320" font-family="-apple-system, Arial, sans-serif" font-size="56" font-weight="800" fill="#CCFF00" letter-spacing="-1">$1B Venture Fund</text>

